services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iot_climate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iot_climate"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/iot_climate
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: climate/readings
      MQTT_ENABLED: "true"
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me}
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
