<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Monitoramento Climatico IoT</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2f6;
        color: #18212f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
      }

      .login-card {
        background: #fff;
        border: 1px solid #dfe6ef;
        border-radius: 8px;
        box-shadow: 0 14px 34px rgba(16, 32, 51, 0.08);
        max-width: 420px;
        padding: 28px;
        width: 100%;
      }

      h1 {
        font-size: 1.45rem;
        margin: 0 0 6px;
      }

      p {
        color: #526173;
        margin: 0 0 22px;
      }

      label {
        color: #526173;
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }

      input {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit;
        min-height: 42px;
        padding: 9px 11px;
      }

      button {
        background: #0f766e;
        border: 0;
        border-radius: 8px;
        color: #fff;
        cursor: pointer;
        font: inherit;
        min-height: 42px;
        width: 100%;
      }

      button:disabled {
        background: #94a3b8;
        cursor: wait;
      }

      .error {
        color: #b91c1c;
        min-height: 22px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <h1>Monitoramento Climatico</h1>
      <p>Acesse o dashboard com suas credenciais.</p>
      <form id="loginForm">
        <label>
          Usuario
          <input id="username" name="username" autocomplete="username" required />
        </label>
        <label>
          Senha
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button id="loginButton" type="submit">Entrar</button>
        <div id="loginError" class="error" role="alert"></div>
      </form>
    </main>
    <script>
      const form = document.getElementById("loginForm");
      const button = document.getElementById("loginButton");
      const errorBox = document.getElementById("loginError");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        button.disabled = true;
        button.textContent = "Entrando...";
        errorBox.textContent = "";

        try {
          const response = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: document.getElementById("username").value,
              password: document.getElementById("password").value,
            }),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Nao foi possivel fazer login");
          }
          localStorage.setItem("accessToken", data.access_token);
          window.location.href = "/dashboard";
        } catch (error) {
          errorBox.textContent = error.message;
        } finally {
          button.disabled = false;
          button.textContent = "Entrar";
        }
      });
    </script>
  </body>
</html>
